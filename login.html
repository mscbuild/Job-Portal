{% extends "base.html" %}

{% block content %}
<div class="col-md-4 mx-auto">

    <h3 class="mb-3">Login</h3>

    <form method="POST" class="card p-3 shadow-sm">
        {{ form.hidden_tag() }}

        {{ form.username(class="form-control mb-2", placeholder="Username") }}
        {{ form.password(class="form-control mb-2", placeholder="Password") }}

        <button class="btn btn-primary w-100">Login</button>
    </form>

</div>
{% endblock %}
