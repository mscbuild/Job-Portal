<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="container mt-5">
    <h2>Registration</h2>
    <form method="POST">
    {{ form.hidden_tag() }}

    <p>Username:</p>
    {{ form.username() }}

    <p>Password:</p>
    {{ form.password() }}

    <p>Role:</p>
    {{ form.role() }}

    <br><br>
    <button type="submit">Register</button>
</form>
</body>
</html>
