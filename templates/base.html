<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <a class="navbar-brand" href="/dashboard">💼 JobPortal</a>

        <div class="d-flex gap-2">

            {% if current_user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="/notifications">
                    🔔 ({{ notification_count }})
                </a>

                <a class="btn btn-outline-warning btn-sm" href="/logout">
                    Logout
                </a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="/login">Login</a>
                <a class="btn btn-success btn-sm" href="/register">Register</a>
            {% endif %}

        </div>

    </div>
</nav>

<div class="container">

    {% block content %}{% endblock %}

</div>

</body>
</html>
