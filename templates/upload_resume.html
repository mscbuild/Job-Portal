{% extends "base.html" %}

{% block content %}

<h3>Upload Resume</h3>

<form method="POST" enctype="multipart/form-data" class="card p-3 shadow-sm">
    {{ form.hidden_tag() }}

    {{ form.resume(class="form-control mb-2") }}

    <button class="btn btn-primary">Upload</button>
</form>

{% endblock %}
